# Foi utilizada a Action actions/upload-artifact, disponível no GitHub Marketplace, para armazenar os relatórios gerados pelos testes automatizados do Playwright. 
#A solução facilita a análise dos resultados da execução, permitindo que a equipe faça download das evidências dos testes, identifique falhas e acompanhe a qualidade da aplicação diretamente pelo GitHub Actions.

# CI de Nível 02 - Execução Manual + Relatório de Testes

name: 'Execução Manual'

on:
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Instalando Yarn
        run: npm install -g yarn

      - name: Instalando dependências
        run: yarn

      - name: Instalando Browsers do Playwright
        run: yarn playwright install --with-deps

      - name: Executando testes e2e
        run: yarn run e2e

      - name: Verificando relatórios gerados
        if: always()
        run: |
          echo "Arquivos gerados:"
          ls -la
          echo "Pasta playwright-report:"
          ls -la playwright-report || true
          echo "Arquivo results.xml:"
          ls -la results.xml || true

      - name: Publicando relatórios Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorios-playwright
          path: |
            playwright-report/
            results.xml
          retention-days: 7